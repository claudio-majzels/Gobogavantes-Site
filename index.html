<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bogavantes — Socio de operaciones con IA</title>
<meta name="description" content="No te entrego un informe. Me quedo a tu lado. Uso IA y automatización para resolver lo que frena tu negocio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* Editorial Fogo — branco + preto + laranja-fogo */
  --ink:#FFFFFF;            /* fundo principal (branco puro) */
  --surface:#FFFFFF;        /* cards: branco com borda preta */
  --surface-2:#FFFFFF;      /* seções alternadas: branco (separadas por hairline) */
  --amber:#FF3D00;          /* laranja-fogo — acento único de interação */
  --amber-bright:#FF5722;   /* hover do laranja */
  --teal:#0A0A0A;           /* segundo acento absorvido em preto */
  --paper:#0A0A0A;          /* texto preto (quase-preto) */
  --paper-dim:#6B6B6B;      /* texto secundário cinza médio */
  --line:rgba(10,10,10,0.14); /* hairlines sutis pretas */
  --line-bold:#0A0A0A;      /* hairlines pretas duras */
  --serif:'Fraunces',Georgia,serif;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:var(--sans);
  font-size:17px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--amber);color:var(--paper)}

.wrap{max-width:1180px;margin:0 auto;padding:0 32px}
section{position:relative}

/* atmosphere killed — flat editorial */
.grain{display:none}

/* ---- nav ---- */
nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px;
  transition:background .3s ease,padding .3s ease,border-color .3s ease;
  border-bottom:1px solid transparent;
}
nav.scrolled{
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(8px);
  padding:14px 32px;
  border-bottom:1px solid var(--line-bold);
}
.brand{
  font-family:var(--serif);font-size:23px;font-weight:600;letter-spacing:.02em;
  display:flex;align-items:center;gap:11px;
}
.brand .dot{
  width:9px;height:9px;border-radius:50%;background:var(--amber);
}
.nav-right{display:flex;align-items:center;gap:26px}
.nav-links{display:flex;gap:26px}
.nav-links a{
  font-size:14px;color:var(--paper-dim);transition:color .2s;
  font-weight:500;
}
.nav-links a:hover{color:var(--paper)}
.lang{
  display:flex;gap:2px;border:1px solid var(--line);border-radius:999px;
  padding:3px;background:rgba(255,255,255,.02);
}
.lang button{
  background:none;border:none;color:var(--paper-dim);cursor:pointer;
  font-family:var(--sans);font-size:12px;font-weight:600;
  padding:5px 11px;border-radius:999px;transition:all .2s;letter-spacing:.04em;
}
.lang button.active{background:var(--amber);color:var(--paper)}
.nav-cta{
  font-size:13px;font-weight:600;color:var(--ink);background:var(--paper);
  padding:9px 17px;border-radius:999px;transition:transform .15s;
}
/* nav-cta: white text on black bg in new system (var(--ink)=white, var(--paper)=black) */
.nav-cta:hover{transform:translateY(-1px)}

/* ---- hero ---- */
.hero{
  min-height:100vh;display:flex;align-items:center;
  padding:160px 0 100px;position:relative;overflow:hidden;
  border-bottom:1px solid var(--line-bold);
}
.hero .wrap{position:relative;z-index:2;width:100%}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center}
.hero-img{
  position:relative;aspect-ratio:4/5;border:1px solid var(--line-bold);
  background:var(--amber);overflow:hidden;
}
.hero-img img{display:block;width:100%;height:100%;object-fit:cover;
  filter:grayscale(100%) contrast(1.08);mix-blend-mode:multiply;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:9px;
  font-family:var(--mono);font-size:12.5px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--amber);
  margin-bottom:30px;
  border:1px solid rgba(255,61,0,.35);border-radius:999px;
  padding:7px 15px;
}
.eyebrow::before{
  content:"";width:6px;height:6px;border-radius:50%;background:var(--amber);
  animation:pulse 2.4s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{
  font-family:var(--serif);font-weight:500;
  font-size:clamp(2.7rem,6.4vw,5.1rem);
  line-height:1.04;letter-spacing:-.018em;
  max-width:16ch;margin-bottom:30px;
}
h1 em{font-style:italic;color:var(--amber-bright)}
.hero-sub{
  font-size:clamp(1.05rem,2vw,1.32rem);
  color:var(--paper-dim);max-width:54ch;line-height:1.6;
  margin-bottom:42px;
}
.hero-sub strong{color:var(--paper);font-weight:600}
.btn-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:11px;
  font-weight:600;font-size:15.5px;
  padding:16px 28px;border-radius:999px;
  transition:transform .16s ease,box-shadow .16s ease;
}
.btn-primary{
  background:var(--amber);color:var(--paper);
}
.btn-primary:hover{transform:translateY(-2px);background:var(--amber-bright)}
.btn-ghost{color:var(--paper);border:1px solid var(--line-bold)}
.btn-ghost:hover{background:var(--paper);color:var(--ink);transform:translateY(-2px)}
.btn svg{width:18px;height:18px}

.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}
.d4{transition-delay:.32s}.d5{transition-delay:.4s}

/* ---- section heading ---- */
.sec-head{margin-bottom:58px;max-width:64ch}
.sec-tag{
  font-family:var(--mono);font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--amber);margin-bottom:18px;
  display:flex;align-items:center;gap:12px;
}
.sec-tag::before{content:"";width:30px;height:1px;background:var(--amber)}
h2{
  font-family:var(--serif);font-weight:500;
  font-size:clamp(2rem,4.2vw,3.1rem);
  line-height:1.1;letter-spacing:-.015em;
}
h2 em{font-style:italic;color:var(--amber-bright)}
.sec-intro{color:var(--paper-dim);font-size:1.1rem;margin-top:20px;max-width:58ch}

/* ---- pain ---- */
.pain{padding:120px 0;border-top:1px solid var(--line-bold)}
.pain-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
}
.pain-card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:30px;
  transition:transform .25s ease,border-color .25s ease;
  position:relative;overflow:hidden;
}
.pain-card:hover{transform:translateY(-4px);border-color:var(--amber)}
.pain-card .q{
  font-family:var(--serif);font-style:italic;font-size:1.32rem;
  line-height:1.35;color:var(--paper);
}
.pain-card .n{
  font-family:var(--mono);font-size:12px;color:var(--amber);
  margin-bottom:16px;letter-spacing:.1em;
}

/* ---- category / vs ---- */
.category{padding:120px 0;background:var(--surface-2);border-top:1px solid var(--line-bold)}
.cat-statement{
  font-family:var(--serif);font-weight:500;
  font-size:clamp(1.7rem,3.6vw,2.7rem);line-height:1.28;
  letter-spacing:-.01em;max-width:20ch;margin-bottom:54px;
}
.cat-statement b{color:var(--amber-bright);font-weight:500;font-style:italic}
.vs{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  border:1px solid var(--line);border-radius:20px;overflow:hidden;
}
.vs-col{padding:14px 0}
.vs-col.them{background:transparent}
.vs-col.us{background:rgba(255,61,0,.06)}
.vs-head{
  padding:22px 32px 18px;font-weight:700;font-size:13px;
  letter-spacing:.1em;text-transform:uppercase;
  border-bottom:1px solid var(--line);
}
.vs-col.them .vs-head{color:var(--paper-dim)}
.vs-col.us .vs-head{color:var(--amber)}
.vs-row{
  padding:16px 32px;font-size:15.5px;display:flex;gap:13px;
  align-items:flex-start;line-height:1.45;
}
.vs-row svg{width:17px;height:17px;flex-shrink:0;margin-top:3px}
.vs-col.them .vs-row{color:var(--paper-dim)}
.vs-col.us .vs-row{color:var(--paper)}

/* ---- products ---- */
.products{padding:120px 0;border-top:1px solid var(--line-bold)}
.journey{
  display:flex;align-items:center;gap:14px;margin-bottom:46px;
  font-family:var(--mono);font-size:13px;color:var(--paper-dim);
  flex-wrap:wrap;
}
.journey b{color:var(--amber-bright);font-weight:500}
.journey .arr{color:var(--amber)}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.prod{
  background:var(--surface);border:1px solid var(--line);
  border-radius:20px;padding:34px 30px;
  display:flex;flex-direction:column;
  transition:transform .25s ease,border-color .25s ease;
  position:relative;overflow:hidden;
}
.prod:hover{transform:translateY(-6px);border-color:var(--amber)}
.prod-step{
  font-family:var(--mono);font-size:12px;color:var(--amber);
  letter-spacing:.1em;margin-bottom:20px;
}
.prod-name{
  font-family:var(--serif);font-size:1.85rem;font-weight:500;
  margin-bottom:7px;
}
.prod-kicker{
  font-size:13.5px;color:var(--amber-bright);font-weight:600;
  margin-bottom:18px;letter-spacing:.01em;
}
.prod-desc{color:var(--paper-dim);font-size:15px;line-height:1.6;margin-bottom:22px}
.prod-feat{list-style:none;margin-bottom:26px;display:flex;flex-direction:column;gap:10px}
.prod-feat li{
  font-size:14px;display:flex;gap:10px;align-items:flex-start;
  color:var(--paper);
}
.prod-feat li::before{
  content:"";width:6px;height:6px;border-radius:50%;background:var(--amber);
  margin-top:8px;flex-shrink:0;
}
.prod-link{
  margin-top:auto;font-weight:600;font-size:14.5px;color:var(--amber-bright);
  display:flex;align-items:center;gap:8px;transition:gap .2s;
}
.prod:hover .prod-link{gap:13px}

/* ---- capabilities ---- */
.caps{padding:110px 0;background:var(--surface-2);border-top:1px solid var(--line-bold)}
.cap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:14px}
.cap{
  border:1px solid var(--line);border-radius:16px;padding:26px 22px;
  background:var(--surface);transition:all .25s ease;
}
.cap:hover{border-color:var(--amber);transform:translateY(-4px)}
.cap-ic{
  width:42px;height:42px;border-radius:11px;
  background:rgba(255,61,0,.12);display:flex;align-items:center;
  justify-content:center;margin-bottom:18px;
}
.cap-ic svg{width:22px;height:22px;stroke:var(--amber)}
.cap h3{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.3}
.cap p{font-size:13.5px;color:var(--paper-dim);line-height:1.55}
.stack-note{
  margin-top:34px;font-family:var(--mono);font-size:12.5px;
  color:var(--paper-dim);text-align:center;letter-spacing:.04em;
}
.stack-note span{color:var(--amber-bright)}

/* ---- sweet spot / venn ---- */
.sweet{padding:120px 0;border-top:1px solid var(--line-bold)}
.sweet-layout{
  display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;
}
.venn-stage{
  position:relative;height:420px;display:flex;align-items:center;
  justify-content:center;
}
.venn{position:relative;width:380px;height:300px}
.circle{
  position:absolute;width:240px;height:240px;border-radius:50%;
  top:30px;display:flex;align-items:center;justify-content:center;
  text-align:center;transition:transform 1.1s cubic-bezier(.22,1,.36,1);
  border:1.5px solid;
}
.circle .lbl{
  font-family:var(--serif);font-size:1.15rem;font-weight:500;
  padding:0 56px;line-height:1.3;
}
.c-prod{
  left:0;background:transparent;border-color:var(--paper);
  transform:translateX(60px);mix-blend-mode:multiply;
}
.c-biz{
  right:0;background:rgba(255,61,0,.18);border-color:var(--amber);
  transform:translateX(-60px);mix-blend-mode:multiply;
}
.venn.open .c-prod{transform:translateX(0)}
.venn.open .c-biz{transform:translateX(0)}
.venn-core{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.4);
  width:120px;height:120px;border-radius:50%;
  background:var(--amber);
  display:flex;align-items:center;justify-content:center;
  text-align:center;opacity:0;
  transition:opacity .6s ease .5s,transform .8s cubic-bezier(.22,1,.36,1) .5s;
  z-index:3;
}
.venn.open .venn-core{opacity:1;transform:translate(-50%,-50%) scale(1)}
.venn-core span{
  font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--paper);letter-spacing:.05em;line-height:1.35;padding:0 14px;
}
.sweet-copy h2{margin-bottom:24px}
.sweet-copy p{color:var(--paper-dim);font-size:1.08rem;margin-bottom:18px}
.sweet-copy p strong{color:var(--paper);font-weight:600}

/* ---- cases ---- */
.cases{padding:120px 0;background:var(--surface-2);border-top:1px solid var(--line-bold)}
.case-list{display:flex;flex-direction:column;gap:16px;margin-top:8px}
.case{
  border:1px solid var(--line);border-radius:18px;
  background:var(--surface);overflow:hidden;transition:border-color .25s;
}
.case.open{border-color:var(--amber)}
.case-bar{
  padding:28px 32px;cursor:pointer;display:flex;align-items:center;
  gap:24px;
}
.case-tag{
  font-family:var(--mono);font-size:11px;color:var(--amber);
  letter-spacing:.1em;border:1px solid rgba(255,61,0,.4);
  padding:5px 10px;border-radius:6px;flex-shrink:0;
}
.case-title{
  font-family:var(--serif);font-size:1.5rem;font-weight:500;flex:1;
}
.case-title b{color:var(--amber-bright);font-weight:500}
.case-toggle{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .3s;
}
.case.open .case-toggle{background:var(--amber);border-color:var(--amber);transform:rotate(45deg)}
.case-toggle svg{width:15px;height:15px;transition:stroke .3s}
.case.open .case-toggle svg{stroke:var(--paper)}
.case-body{
  max-height:0;overflow:hidden;
  transition:max-height .5s cubic-bezier(.4,0,.2,1);
}
.case.open .case-body{max-height:640px}
.case-inner{padding:0 32px 34px;display:grid;grid-template-columns:1fr 1fr;gap:30px}
.case-block h4{
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--amber);margin-bottom:9px;
}
.case-block p{font-size:14.5px;color:var(--paper-dim);line-height:1.6}
.case-block ul{list-style:none;display:flex;flex-direction:column;gap:7px;margin-top:4px}
.case-block li{
  font-size:14px;color:var(--paper);display:flex;gap:9px;align-items:flex-start;
}
.case-block li::before{
  content:"";width:5px;height:5px;border-radius:50%;background:var(--amber);
  margin-top:8px;flex-shrink:0;
}
.case-quote{
  grid-column:1/-1;font-family:var(--serif);font-style:italic;
  font-size:1.32rem;line-height:1.4;color:var(--paper);
  border-left:2px solid var(--amber);padding-left:22px;
}

/* ---- about ---- */
.about{padding:120px 0;border-top:1px solid var(--line-bold)}
.about-layout{display:grid;grid-template-columns:.85fr 1.15fr;gap:64px;align-items:start}
.portrait{
  position:relative;overflow:hidden;
  border:1px solid var(--line-bold);aspect-ratio:4/5;
  background:var(--amber);
}
.portrait img{
  display:block;width:100%;height:100%;object-fit:cover;
  filter:grayscale(100%) contrast(1.08);mix-blend-mode:multiply;
}
.portrait .ph{display:none}
.portrait .mono-c{display:none}
.about-copy h2{margin-bottom:26px}
.about-copy p{color:var(--paper-dim);font-size:1.06rem;margin-bottom:18px}
.about-copy p strong{color:var(--paper);font-weight:600}
.about-final{
  font-family:var(--serif);font-style:italic;font-size:1.3rem;
  color:var(--paper)!important;line-height:1.45;
  border-left:2px solid var(--amber);padding-left:22px;margin-top:26px;
}
.counters{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  margin-top:40px;
}
.counter{
  border:1px solid var(--line);border-radius:14px;padding:22px 16px;
  text-align:center;background:var(--surface);
}
.counter .num{
  font-family:var(--serif);font-size:2.2rem;font-weight:500;
  color:var(--amber-bright);line-height:1;
}
.counter .cap-l{
  font-size:12px;color:var(--paper-dim);margin-top:8px;
  letter-spacing:.03em;
}

/* ---- faq ---- */
.faq{padding:110px 0;background:var(--surface-2);border-top:1px solid var(--line-bold)}
.faq-list{display:flex;flex-direction:column;max-width:820px;margin:8px auto 0}
.faq-item{border-bottom:1px solid var(--line)}
.faq-q{
  padding:26px 4px;cursor:pointer;display:flex;justify-content:space-between;
  gap:24px;align-items:center;
}
.faq-q span{font-size:1.12rem;font-weight:600;font-family:var(--serif)}
.faq-q .pm{
  width:26px;height:26px;flex-shrink:0;position:relative;
}
.faq-q .pm::before,.faq-q .pm::after{
  content:"";position:absolute;background:var(--amber);
  left:50%;top:50%;transition:transform .3s;
}
.faq-q .pm::before{width:14px;height:2px;transform:translate(-50%,-50%)}
.faq-q .pm::after{width:2px;height:14px;transform:translate(-50%,-50%)}
.faq-item.open .pm::after{transform:translate(-50%,-50%) rotate(90deg);opacity:0}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
.faq-item.open .faq-a{max-height:200px}
.faq-a p{padding:0 4px 26px;color:var(--paper-dim);font-size:15.5px;line-height:1.62}

/* ---- final cta ---- */
.final{padding:140px 0;text-align:center;position:relative;overflow:hidden;border-top:1px solid var(--line-bold)}
.final .wrap{position:relative;z-index:2}
.final h2{margin-bottom:24px;max-width:18ch;margin-left:auto;margin-right:auto}
.final p{color:var(--paper-dim);font-size:1.15rem;margin-bottom:38px;max-width:46ch;margin-left:auto;margin-right:auto}

/* ---- footer ---- */
footer{
  border-top:1px solid var(--line-bold);padding:50px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:20px;
}
footer .brand{font-size:19px}
.foot-meta{font-size:13px;color:var(--paper-dim)}
.foot-meta a{color:var(--amber-bright)}

/* ---- floating wa ---- */
.fab{
  position:fixed;right:24px;bottom:24px;z-index:60;
  display:flex;align-items:center;gap:11px;
  background:var(--amber);color:var(--paper);
  padding:14px 20px;border-radius:999px;font-weight:700;font-size:14.5px;
  border:1px solid var(--paper);
  transition:transform .18s ease,background .18s ease;
}
.fab:hover{transform:translateY(-3px) scale(1.02);background:var(--amber-bright)}
.fab svg{width:21px;height:21px}

/* ---- duotone image system ---- */
.prod-img,.case-img,.brk-img{
  position:relative;overflow:hidden;
  background:var(--amber);
  border:1px solid var(--line-bold);
}
.prod-img{aspect-ratio:16/10;margin:-34px -30px 24px;border-left:0;border-right:0;border-top:0}
.prod-img img,.case-img img,.brk-img img{
  display:block;width:100%;height:100%;object-fit:cover;
  filter:grayscale(100%) contrast(1.08);mix-blend-mode:multiply;
}
.case-img{aspect-ratio:21/9;margin-bottom:8px;border-radius:14px}
.brk{padding:80px 32px;border-top:1px solid var(--line-bold);border-bottom:1px solid var(--line-bold)}
.brk-img{max-width:1180px;margin:0 auto;aspect-ratio:21/9;border-radius:0}

/* ---- responsive ---- */
@media(max-width:940px){
  .pain-grid{grid-template-columns:1fr 1fr}
  .prod-grid{grid-template-columns:1fr}
  .cap-grid{grid-template-columns:1fr 1fr}
  .sweet-layout,.about-layout{grid-template-columns:1fr;gap:48px}
  .counters{grid-template-columns:repeat(2,1fr)}
  .case-inner{grid-template-columns:1fr}
  .nav-links{display:none}

function bindCases(){
  document.querySelectorAll('.case-bar').forEach(bar=>{
    bar.onclick=()=>bar.parentElement.classList.toggle('open');
  });
}
function bindFaq(){
  document.querySelectorAll('.faq-q').forEach(q=>{
    q.onclick=()=>q.parentElement.classList.toggle('open');
  });
}

/* ---- reveal observer ---- */
let revObs;
function observeReveals(){
  if(revObs) revObs.disconnect();
  revObs=new IntersectionObserver(es=>{
    es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');revObs.unobserve(e.target);}});
  },{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>revObs.observe(el));
}

/* ---- venn animation ---- */
const venn=document.getElementById('venn');
new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting)venn.classList.add('open');});
},{threshold:.4}).observe(venn);

/* ---- counter animation ---- */
function animateCounters(){
  document.querySelectorAll('.counter .num').forEach(el=>{
    const txt=el.textContent;
    const m=txt.match(/[\d.]+/);
    if(!m)return;
    const target=parseFloat(m[0]);
    const suffix=txt.replace(m[0],'');
    let cur=0;const step=target/40;
    const t=setInterval(()=>{
      cur+=step;
      if(cur>=target){cur=target;clearInterval(t);}
      el.textContent=(target>=10?Math.round(cur):cur.toFixed(0))+suffix;
    },24);
  });
}
let counted=false;
new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting&&!counted){counted=true;animateCounters();}});
},{threshold:.5}).observe(document.querySelector('.about'));

/* ---- nav scroll ---- */
const nav=document.getElementById('nav');
addEventListener('scroll',()=>{
  nav.classList.toggle('scrolled',scrollY>40);
});

/* ---- lang switch ---- */
document.querySelectorAll('.lang button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.lang button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.lang);
  };
});

/* ---- init: detect browser language ---- */
(function(){
  const nl=(navigator.language||'es').slice(0,2);
  const start=['es','pt','en'].includes(nl)?nl:'es';
  document.querySelectorAll('.lang button').forEach(x=>{
    x.classList.toggle('active',x.dataset.lang===start);
  });
  render(start);
})();
</script>
