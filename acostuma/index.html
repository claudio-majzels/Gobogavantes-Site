<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bogavantes · Acceso privado</title>
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Documento privado de Bogavantes. Acceso con contraseña.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#FFFFFF; --paper:#0A0A0A; --amber:#FF3D00; --amber-br:#FF5722;
    --amber-d:#D12E00; --muted:#6B6B6B; --line:rgba(10,10,10,.14);
    --line-bold:#0A0A0A; --black:#0A0A0A;
    --serif:'Fraunces',Georgia,serif; --sans:'Plus Jakarta Sans',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);background:var(--ink);color:var(--paper);line-height:1.65;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--amber);color:var(--paper)}

  /* ============ GATE ============ */
  .gate{
    position:fixed;inset:0;z-index:100;background:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px;text-align:center;
  }
  .gate.hide{display:none}
  .gate-top{
    position:absolute;top:0;left:0;right:0;display:flex;align-items:center;
    justify-content:space-between;padding:22px 32px;
    border-bottom:1px solid var(--line);
  }
  .gate-brand{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:10px}
  .gate-brand .dot{width:9px;height:9px;border-radius:50%;background:var(--amber)}
  .gate-top .role{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .gate-card{width:100%;max-width:440px}
  .gate-eyebrow{
    display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);
    border:1px solid rgba(255,61,0,.35);border-radius:999px;padding:7px 15px;margin-bottom:28px;
  }
  .gate-eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .gate-card h1{
    font-family:var(--serif);font-weight:500;font-size:clamp(2rem,6vw,2.9rem);
    line-height:1.08;letter-spacing:-.018em;margin-bottom:18px;
  }
  .gate-card h1 i{font-style:italic;color:var(--amber-br)}
  .gate-card p{color:var(--muted);font-size:15.5px;max-width:34ch;margin:0 auto 34px}
  .gate-form{display:flex;flex-direction:column;gap:14px;align-items:stretch}
  .gate-input{
    font-family:var(--mono);font-size:15px;letter-spacing:.04em;color:var(--paper);
    background:#fff;border:1px solid var(--line-bold);border-radius:999px;
    padding:16px 22px;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s;
  }
  .gate-input::placeholder{color:#bbb;letter-spacing:.08em}
  .gate-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(255,61,0,.12)}
  .gate-btn{
    font-family:var(--sans);font-weight:600;font-size:15.5px;color:var(--paper);
    background:var(--amber);border:none;border-radius:999px;padding:16px 28px;cursor:pointer;
    transition:transform .16s ease,background .16s ease;display:inline-flex;align-items:center;justify-content:center;gap:10px;
  }
  .gate-btn:hover{background:var(--amber-br);transform:translateY(-2px)}
  .gate-btn:disabled{opacity:.55;cursor:wait;transform:none}
  .gate-err{min-height:20px;font-size:13.5px;color:var(--amber-d);font-weight:600;letter-spacing:.01em;opacity:0;transition:opacity .2s}
  .gate-err.show{opacity:1}
  .gate-foot{position:absolute;bottom:0;left:0;right:0;padding:20px 32px;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  @media(max-width:560px){.gate-top .role{display:none}.gate-foot .num{display:none}}

  /* ============ DOCUMENT (Editorial Fogo) ============ */
  #doc{display:none}
  #doc.show{display:block}
  #doc{
    --d-text:#F4F4F4;--d-dim:#9A9A9A;--d-line:rgba(255,255,255,.14);--d-surf:#141414;--d-accent:#FF6A3D;
    background:var(--ink);color:var(--paper);
  }
  #doc .inner{max-width:1040px;margin:0 auto;padding:0 32px}
  #doc h1,#doc h2,#doc h3,#doc h4{font-family:var(--serif);font-weight:500;letter-spacing:-.012em}
  #doc h1 i,#doc h2 i{font-style:italic;color:var(--amber-br)}
  #doc .eyebrow{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);display:inline-flex;align-items:center;gap:12px}
  #doc .eyebrow::before{content:"";width:30px;height:1px;background:var(--amber)}
  #doc svg text{font-family:var(--sans)}

  /* topbar */
  #doc .topbar{border-bottom:1px solid var(--line)}
  #doc .topbar .inner{display:flex;justify-content:space-between;align-items:center;height:62px}
  #doc .wordmark{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:9px}
  #doc .wordmark .bdot{width:9px;height:9px;border-radius:50%;background:var(--amber);display:inline-block}
  #doc .topbar .role{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

  /* hero */
  #doc .hero{padding:96px 0 78px;border-bottom:1px solid var(--line-bold)}
  #doc .hero h1{font-size:clamp(44px,7vw,84px);line-height:1.02;margin-top:26px;max-width:17ch;font-weight:500}
  #doc .hero .lead{font-size:clamp(17px,2.1vw,21px);color:var(--muted);max-width:58ch;margin-top:28px}
  #doc .hero .rule{width:54px;height:3px;background:var(--amber);margin-top:38px}

  #doc section{padding:88px 0;border-top:1px solid var(--line-bold)}
  #doc .head{margin-bottom:8px}
  #doc h2.big{font-size:clamp(30px,5vw,52px);line-height:1.04;margin-top:14px;max-width:20ch}
  #doc .sub{font-size:17.5px;color:var(--muted);max-width:62ch;margin-top:16px}

  #doc .fig{margin:0 auto;display:block;width:100%}
  #doc .figwrap{max-width:780px;margin:52px auto 0}
  #doc .legend{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 26px;margin-top:30px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  #doc .legend span{display:inline-flex;align-items:center;gap:9px}
  #doc .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  #doc .dot.mar{background:var(--black)} #doc .dot.lob{background:var(--amber)} #doc .dot.com{background:transparent;border:1.5px dashed var(--paper);opacity:.45}

  /* caption cards */
  #doc .caps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:50px}
  #doc .cap{border:1px solid var(--line);border-radius:16px;padding:24px 22px;transition:transform .25s ease,border-color .25s ease;background:#fff}
  #doc .cap:hover{transform:translateY(-4px);border-color:var(--amber)}
  #doc .cap .k{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--amber-d)}
  #doc .cap h4{font-size:21px;margin:8px 0 6px;font-weight:500}
  #doc .cap p{font-size:14px;color:var(--muted)}

  #doc .archnote{text-align:center;font-size:15px;color:var(--muted);margin-top:34px}
  #doc .archnote b{color:var(--amber-d);font-weight:600}

  /* RAG dark */
  #doc .rag{background:var(--black);color:var(--d-text);border-top:none}
  #doc .rag .eyebrow{color:var(--d-accent)} #doc .rag .eyebrow::before{background:var(--d-accent)}
  #doc .rag h2.big{color:var(--d-text)} #doc .rag h2.big i{color:var(--d-accent)}
  #doc .rag .sub{color:var(--d-dim)} #doc .rag .sub strong{color:var(--d-text);font-weight:600}
  #doc .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
  #doc .step{background:var(--d-surf);border:1px solid var(--d-line);border-radius:16px;padding:24px 22px}
  #doc .step .n{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--d-accent);letter-spacing:.1em}
  #doc .step .st{font-family:var(--serif);font-size:24px;line-height:1.05;margin-top:12px;color:var(--d-text);font-weight:500}
  #doc .step .code{font-family:var(--mono);font-size:11.5px;color:var(--d-dim);margin-top:5px}
  #doc .step p{font-size:14.5px;color:#D8D8D8;margin-top:12px}
  #doc .ragnote{text-align:center;font-family:var(--mono);font-size:13px;color:var(--d-dim);margin-top:34px;letter-spacing:.02em}
  #doc .ragnote b{color:var(--d-accent);font-weight:700}

  /* versus dark */
  #doc .versus{background:var(--black);color:var(--d-text);border-top:none}
  #doc .versus .eyebrow{color:var(--d-accent)} #doc .versus .eyebrow::before{background:var(--d-accent)}
  #doc .versus h2.big{color:var(--d-text)} #doc .versus h2.big i{color:var(--d-accent)}
  #doc .versus .sub{color:var(--d-dim)}
  #doc .vs-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:54px;position:relative}
  #doc .vcard{background:var(--d-surf);border:1px solid var(--d-line);border-radius:18px;padding:32px 30px}
  #doc .vcard.win{background:linear-gradient(180deg,rgba(255,61,0,.15),rgba(255,61,0,.03));border-color:rgba(255,61,0,.45)}
  #doc .vcard .who{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--d-dim)}
  #doc .vcard.win .who{color:var(--d-accent)}
  #doc .vcard .meta{font-family:var(--serif);font-style:italic;font-size:25px;line-height:1.12;margin:8px 0 22px;color:var(--d-text);font-weight:500}
  #doc .vrow{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-top:1px solid var(--d-line);font-size:15px}
  #doc .vrow:first-of-type{border-top:none}
  #doc .mk{flex:none;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;margin-top:1px}
  #doc .mk svg{width:13px;height:13px}
  #doc .mk.no{background:rgba(255,255,255,.12)} #doc .mk.no svg{stroke:var(--d-dim)}
  #doc .mk.yes{background:var(--amber)} #doc .mk.yes svg{stroke:#fff}
  #doc .vrow .lab{color:var(--d-dim)} #doc .vcard.win .vrow .lab{color:var(--d-text)}
  #doc .vtag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--amber);color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;padding:5px 16px;border-radius:999px;letter-spacing:.08em;z-index:2}

  /* receita */
  #doc .rev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:50px}
  #doc .rcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 22px;position:relative;overflow:hidden;transition:transform .25s ease,border-color .25s ease}
  #doc .rcard:hover{transform:translateY(-4px);border-color:var(--amber)}
  #doc .rcard::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--amber)}
  #doc .rcard .n{font-family:var(--mono);font-size:12px;color:var(--amber-d);font-weight:700}
  #doc .rcard h4{font-size:22px;margin:10px 0 8px;font-weight:500}
  #doc .rcard p{font-size:13.5px;color:var(--muted)}

  /* close */
  #doc .close{background:var(--amber);color:#1A0A04;border-top:none}
  #doc .close h2{font-size:clamp(32px,5.4vw,56px);line-height:1.04;max-width:20ch;font-weight:500}
  #doc .close h2 i{font-style:italic;color:#2A0C02}
  #doc .close .sub{color:rgba(26,10,4,.82)}
  #doc .close .sub strong{color:#0A0A0A;font-weight:600}
  #doc footer{background:var(--black);color:var(--d-text);padding:34px 0}
  #doc footer .inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-family:var(--mono);font-size:12.5px;letter-spacing:.08em}
  #doc footer .num{color:var(--d-dim)}

  #doc .rev-el{opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.2,.7,.3,1),transform .7s cubic-bezier(.2,.7,.3,1)}
  #doc .rev-el.in{opacity:1;transform:none}

  @media(max-width:760px){
    #doc .hero{padding:60px 0 48px} #doc section{padding:56px 0}
    #doc .caps{grid-template-columns:1fr 1fr;gap:14px}
    #doc .steps{grid-template-columns:1fr;gap:14px}
    #doc .vs-grid{grid-template-columns:1fr;gap:30px}
    #doc .rev-grid{grid-template-columns:1fr 1fr;gap:14px}
  }
  @media(prefers-reduced-motion:reduce){#doc .rev-el{transition:none;opacity:1;transform:none}html{scroll-behavior:auto}}
</style>
</head>

  };

  const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

  async function decrypt(password){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(password), {name:"PBKDF2"}, false, ["deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:b64ToBytes(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:"SHA-256"},
      baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]
    );
    const plain = await crypto.subtle.decrypt(
      {name:"AES-GCM", iv:b64ToBytes(PAYLOAD.iv)}, key, b64ToBytes(PAYLOAD.ct)
    );
    return new TextDecoder().decode(plain);
  }

  const gate = document.getElementById('gate');
  const docEl = document.getElementById('doc');
  const form = document.getElementById('gateForm');
  const pw = document.getElementById('pw');
  const btn = document.getElementById('gateBtn');
  const err = document.getElementById('err');

  function revealObserver(){
    const io = new IntersectionObserver((es)=>{
      es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    },{threshold:.12});
    docEl.querySelectorAll('.rev-el').forEach((el,i)=>{ el.style.transitionDelay=(i%3)*70+'ms'; io.observe(el); });
  }

  async function unlock(password, fromStore){
    btn.disabled = true;
    err.classList.remove('show');
    try{
      const html = await decrypt(password);
      docEl.innerHTML = html;
      gate.classList.add('hide');
      docEl.classList.add('show');
      document.documentElement.lang = 'pt-BR';
      try{ sessionStorage.setItem('acostuma_k', password); }catch(_){}
      requestAnimationFrame(revealObserver);
      window.scrollTo(0,0);
    }catch(e){
      btn.disabled = false;
      if(!fromStore){
        err.classList.add('show');
        pw.value=''; pw.focus();
      }
    }
  }

  form.addEventListener('submit', (e)=>{ e.preventDefault(); if(pw.value) unlock(pw.value, false); });

  // Auto-unlock within the same browser session
  try{
    const k = sessionStorage.getItem('acostuma_k');
    if(k) unlock(k, true); else pw.focus();
  }catch(_){ pw.focus(); }
</script>
